version: 0.1

component: build

timeoutInSeconds: 10000

shell: bash

steps:
  - type: Command
    name: Install Docker
    command: |
      yum install -y docker

  - type: Command
    name: Build Image
    command: |
      docker build -t flask-app .

  - type: Command
    name: Show Images
    command: |
      docker images
