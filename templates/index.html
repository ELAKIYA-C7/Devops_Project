<!DOCTYPE html>
<html>
<head>
<title>DevOps Pipeline Demo</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.text{
    font-size:45px;
    font-weight:bold;
    color:#38bdf8;
    border-right:4px solid #38bdf8;
    white-space:nowrap;
    overflow:hidden;
    width:0;
    animation:typing 4s steps(40,end) forwards, blink .8s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:700px}
}

@keyframes blink{
    50%{border-color:transparent}
}
</style>

</head>

<body>

<div class="text">
Hello DevOps – CI/CD Pipeline Working!
</div>

</body>
</html>
